<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Tic-Tac-Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="neon">
    <main class="app">
      <section class="panel game-card">
        <h1>Neon Tic-Tac-Toe</h1>
        <p class="subtitle">Play PvP or challenge the AI.</p>

        <div class="top-controls">
          <label class="mode-control">
            Mode
            <select id="modeSelect">
              <option value="pvp">Player vs Player</option>
              <option value="ai">Player vs AI</option>
            </select>
          </label>

          <label class="mode-control">
            Theme
            <select id="themeSelect">
              <option value="neon">Neon</option>
              <option value="sunset">Sunset</option>
              <option value="midnight">Midnight</option>
            </select>
          </label>
        </div>

        <div class="hud">
          <div class="turn" id="turnText">Turn: X</div>
          <div class="scoreboard">
            <div class="score x"><span>X</span><strong id="scoreX">0</strong></div>
            <div class="score draw"><span>Draw</span><strong id="scoreDraw">0</strong></div>
            <div class="score o"><span>O</span><strong id="scoreO">0</strong></div>
          </div>
        </div>

        <div class="board" id="board" aria-label="Tic Tac Toe Board"></div>

        <div class="controls">
          <button id="restartBtn" class="btn primary">Restart Round</button>
          <button id="newMatchBtn" class="btn ghost">New Match</button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
